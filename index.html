<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whack a Mole</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="menu-screen" class="screen">
      <h1>Whack a Mole</h1>

      <label for="username-input">Username</label>
      <input type="text" id="username-input" placeholder="Masukin nama lo" maxlength="20" />

      <label>Level</label>
      <div id="level-buttons" class="level-buttons">
        <button data-level="easy" class="level-btn active">Easy (3x3)</button>
        <button data-level="medium" class="level-btn">Medium (4x4)</button>
        <button data-level="hard" class="level-btn">Hard (5x5)</button>
      </div>

      <button id="start-btn" class="primary-btn">Mulai main</button>
      <p id="menu-error" class="error-text"></p>

      <div class="leaderboard-section">
        <h2>Leaderboard</h2>
        <table id="leaderboard-table">
          <thead>
            <tr><td>#</td><td>Nama</td><td>Level</td><td>Skor</td></tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>

    <div id="game-screen" class="screen hidden">
      <div class="game-header">
        <div>
          <p class="label">Skor</p>
          <p id="score-display" class="value">0</p>
        </div>
        <div>
          <p class="label">Waktu</p>
          <p id="timer-display" class="value">30s</p>
        </div>
      </div>
      <div id="mole-grid" class="mole-grid"></div>
    </div>

    <div id="results-screen" class="screen hidden">
      <p class="label">Skor akhir lo</p>
      <p id="final-score" class="value big">0</p>
      <p id="final-info" class="label"></p>
      <button id="play-again-btn" class="primary-btn">Main lagi</button>

      <div class="leaderboard-section">
        <h2>Leaderboard</h2>
        <table id="leaderboard-table-results">
          <thead>
            <tr><td>#</td><td>Nama</td><td>Level</td><td>Skor</td></tr>
          </thead>
          <tbody id="leaderboard-body-results"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="script.js"></script>
</body>
</html>
